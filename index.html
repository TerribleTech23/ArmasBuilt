<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArmasBuilt | Precision Hardware Restoration</title>
    <style>
        :root { 
            --bg-pure-black: #000000; /* Matching the image exactly */
            --card-bg: #0a0a0a; 
            --text-main: #f3e8ff; 
            --accent-purple: #9333ea; 
            --accent-red: #dc2626; 
            --border: #222222;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-pure-black); 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        .main-logo {
            width: 280px;
            height: auto;
            display: block;
            margin: 0 auto 10px;
        }

        h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            letter-spacing: -2px;
            background: linear-gradient(to right, var(--accent-red), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .tagline { font-size: 1.1rem; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
        
        .grid { display: grid; gap: 25px; margin-top: 50px; text-align: left; }
        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
        }
        .footer { margin-top: 80px; padding-top: 30px; border-top: 1px solid var(--border); }
        .cta-button { 
            display: inline-block; 
            border: 1px solid var(--accent-purple); 
            color: white; 
            padding: 12px 30px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="armasbuilt-shield.png" alt="Armas Built" class="main-logo">
            <h1>Armas&bull;Built</h1>
            <p class="tagline">Precision Hardware Restoration</p>
        </header>
        <div class="grid">
            <div class="card">
                <h3>Hardware Integrity</h3>
                <p>Architectural repair and refurbishment of precision hardware systems.</p>
            </div>
        </div>
        <div class="footer">
            <a href="mailto:repair@armasbuilt.com" class="cta-button">repair@armasbuilt.com</a>
        </div>
    </div>
</body>
</html>
